  width: 100%;
  color: white;

/* GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 15px;
}

/* 🔥 ALIGNEMENT FIX */
#grid div {
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:120px;
  text-align:center;
}

#grid img {
  width:50px;
  height:50px;
  object-fit:cover;
}

/* 🔥 FILTRE RARETE */
.rarity-filter {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

.rarity-btn {
  padding:6px 10px;
  border-radius:999px;
  cursor:pointer;
  background:#1e293b;
}

.rarity-btn.active {
  background:white;
  color:black;
}

.mutation-Gold { background: linear-gradient(135deg, gold, orange); }
.mutation-Diamond { background: linear-gradient(135deg, cyan, blue); }
.mutation-Rainbow { background: linear-gradient(90deg, red, orange, yellow, green, blue); }
.mutation-Bloodroot { background: linear-gradient(135deg, darkred, red); }
.mutation-Candy { background: linear-gradient(135deg, pink, hotpink); }
.mutation-Lava { background: linear-gradient(135deg, orange, darkred); }
.mutation-Galaxy { background: radial-gradient(circle, #3b0a57, black); }
.mutation-YinYang { background: linear-gradient(90deg, black 50%, white 50%); }
.mutation-Radioactive { background: linear-gradient(135deg, lime, green); }
.mutation-Cursed { background: linear-gradient(135deg, purple, black); }
.mutation-Divine { background: linear-gradient(135deg, white, gold); color:black; }

}
  
.mutation-Cyber p {
  text-shadow: 0 0 5px #22d3ee;

/* 🔥 FILTRE RARETE */
let selectedRarity="All";
const rarities=["All","Common","Rare","Epic","Legendary","Mythic","Dieu","Secret","OG"];

function loadRarityFilter(){
  let f=document.getElementById("rarityFilter");
  f.innerHTML="";
  rarities.forEach(r=>{
    let btn=document.createElement("div");
    btn.className="rarity-btn";
    btn.innerText=r;
btn.setAttribute("data-rarity", r);
    btn.onclick=()=>{
      selectedRarity=r;
      document.querySelectorAll(".rarity-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      loadPicker();
    };
    if(r==="All") btn.classList.add("active");
    f.appendChild(btn);
  });
}

let currentContainer=null;
let selectedBrainrot=null;
let selectedMutation=null;

/* PICKER */
function openPicker(id){
  currentContainer=id;
  document.getElementById("picker").style.display="block";
  loadPicker();
}

function closePicker(){
  document.getElementById("picker").style.display="none";
}

function loadPicker(){
  let grid=document.getElementById("grid");
  grid.innerHTML="";

  let search=document.getElementById("searchBrainrot").value.toLowerCase();

  brainrots.forEach((b,i)=>{
    if(!b.name.toLowerCase().includes(search)) return;

    let card=document.createElement("div");
    card.innerHTML=`<img src="${b.img}"><br>${b.name}`;
card.dataset.index = i;
    card.onclick=()=>openMutationPicker(i);

    grid.appendChild(card);
  });

  /* 🔥 FILTRE APRES LOAD */
  let cards=grid.children;
  for(let i=0;i<cards.length;i++){
    let index = cards[i].dataset.index;
let b = brainrots[index];
    if(!b) continue;

    if(selectedRarity!=="All" && b.rarity!==selectedRarity){
      cards[i].style.display="none";
    } else {
      cards[i].style.display="flex";
    }
  }
}

document.getElementById("searchBrainrot").addEventListener("keyup", loadPicker);

/* MUTATION */
function openMutationPicker(index){
  selectedBrainrot=index;
  selectedMutation=null;

  let preview=document.getElementById("selectedBrainrotPreview");
  preview.innerHTML=`<button onclick="document.getElementById('mutationPicker').style.display='none'">❌</button><img src="${brainrots[index].img}"><p>${brainrots[index].name}</p>`;

  let mList=document.getElementById("mutationList");
  mList.innerHTML="";

  mutations.forEach(m=>{
    let btn=document.createElement("div");

    btn.innerHTML=`${m.icon} ${m.name}`;
    btn.style.padding="8px";
    btn.style.background="#1e293b";
    btn.style.cursor="pointer";

    btn.onclick=()=>{
      selectedMutation=m.name;
      document.querySelectorAll("#mutationList div").forEach(b=>b.style.background="#1e293b");
      btn.style.background="orange";
    };

    mList.appendChild(btn);
  });

  let tList=document.getElementById("traitsList");
  tList.innerHTML="";

  traits.forEach(t=>{
    let el=document.createElement("span");
    el.className="trait";
    el.innerText=t;
    el.onclick=()=>el.classList.toggle("active");
    tList.appendChild(el);
  });

  document.getElementById("mutationPicker").style.display="block";
}

function validateSelection(){

  if(!selectedMutation){
    alert("Choisis une mutation !");
    return;
  }

  let selectedTraits=[...document.querySelectorAll(".trait.active")]
  .map(t=>t.innerText);

  addItem(selectedBrainrot, selectedMutation, selectedTraits);

  document.getElementById("mutationPicker").style.display="none";
  closePicker();
}

function formatMutation(name){
  return "mutation-" + name.replace(/\s/g,"");
}

/* 🔥 FIX VALUE */
function addItem(i,mutation,traitsList){
  let c=document.getElementById(currentContainer);

  let base=brainrots[i].value;
  let multi=mutationValues[mutation]||1;

  let final=base*multi;

  traitsList.forEach(t=>{
  let clean = t.replace(/^[^\w]+/, "").trim(); // enlève emoji
  final *= traitsValues[clean] || 1;
});

  final = parseFloat(final.toFixed(2));

  let div=document.createElement("div");
  div.className="item " + formatMutation(mutation);

  div.innerHTML=`
    <img src="${brainrots[i].img}">
    <p>${brainrots[i].name} (${final})</p>
    <p>${mutation}</p>
    <p>${traitsList.join(" | ")}</p>
    <button onclick="this.parentElement.remove()">❌</button>
  `;

  div.dataset.value = final;
  c.appendChild(div);
}

/* TRADE */
function getTotal(id){
  let items=document.getElementById(id).getElementsByClassName("item");
  let total=0;
  for(let item of items){ total+=Number(item.dataset.value); }
  return total;
}

function checkTrade(){
  let y=getTotal("yourContainer");
  let t=getTotal("theirContainer");

  document.getElementById("yourValue").innerText="Valeur : "+y;
  document.getElementById("theirValue").innerText="Valeur : "+t;

  let r=document.getElementById("result");

  if(t>y){ r.innerText="WIN ✅"; }
  else if(t===y){ r.innerText="FAIR 🤝"; }
  else{ r.innerText="LOSE ❌"; }
}
